name: Deploy to Laravel Vapor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Adjust the PHP version as needed

      - name: Install Composer Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install Node.js Dependencies and Build Assets
        run: npm install && npm run production # Or yarn install && yarn production if using yarn

      - name: Install Vapor CLI
        run: composer global require laravel/vapor-cli

      - name: Deploy to Production
        run: vapor deploy production
        env:
          VAPOR_API_TOKEN: ${{ secrets.VAPOR_API_TOKEN }}
